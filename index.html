<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Space Network: Cepheus</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; font-family: 'Courier New', Courier, monospace; }
        
        /* UI Overlay */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        #status {
            position: absolute; bottom: 30px; left: 30px;
            color: #80ff80; font-size: 14px; text-transform: uppercase;
            letter-spacing: 2px;
            background: rgba(0, 20, 0, 0.8);
            padding: 12px 20px;
            border-left: 4px solid #80ff80;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 15px rgba(128, 255, 128, 0.2);
            border-radius: 0 4px 4px 0;
            transition: border-color 0.5s;
        }

        /* Hover Data Card */
        #star-intel {
            position: absolute;
            display: none;
            background: rgba(0, 10, 20, 0.9);
            border: 1px solid #7dd3ff;
            color: #e0f7ff;
            padding: 12px;
            border-radius: 4px;
            pointer-events: none;
            z-index: 20;
            font-size: 12px;
            box-shadow: 0 0 15px rgba(125, 211, 255, 0.4);
            min-width: 160px;
        }
        #star-intel h3 { 
            margin: 0 0 8px 0; 
            color: #00ffff; 
            font-size: 14px; 
            border-bottom: 1px solid rgba(125, 211, 255, 0.3); 
            padding-bottom: 5px; 
            text-shadow: 0 0 5px #00ffff;
        }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .data-label { color: #88c0d0; }
        .data-val { color: #fff; font-weight: bold; }
        
        /* Permanent Star Labels */
        .constellation-label {
            color: #7dd3ff;
            font-size: 11px;
            font-weight: bold;
            margin-top: -20px; 
            text-shadow: 0 0 4px #000, 0 0 2px #7dd3ff;
            pointer-events: none; 
            white-space: nowrap;
            opacity: 0.9;
            transition: opacity 1s;
        }

        /* Buttons */
        .btn-core {
            position: absolute;
            left: 50%;
            bottom: 26px;
            transform: translateX(-50%);
            padding: 12px 22px;
            border-radius: 999px;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: bold;
            cursor: pointer;
            display: none;
            pointer-events: auto;
            transition: all 0.3s ease;
        }

        #identity-btn {
            border: 1px solid #44d7ff;
            background: rgba(0, 18, 32, 0.9);
            color: #d8f7ff;
            box-shadow: 0 0 12px rgba(68, 215, 255, 0.45);
        }
        #identity-btn:hover {
            background: rgba(0, 35, 55, 0.95);
            box-shadow: 0 0 16px rgba(68, 215, 255, 0.75);
        }

        #wrap-btn {
            border: 1px solid #ff7df5;
            background: rgba(32, 0, 32, 0.9);
            color: #ffdbfa;
            box-shadow: 0 0 12px rgba(255, 125, 245, 0.45);
        }
        #wrap-btn:hover {
            background: rgba(55, 0, 55, 0.95);
            box-shadow: 0 0 16px rgba(255, 125, 245, 0.75);
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="status">System Initializing...</div>
        <button id="identity-btn" class="btn-core">Acquire Identity</button>
        <button id="wrap-btn" class="btn-core">Wrap Space Around You</button>
    </div>

    <div id="star-intel">
        <h3 id="intel-name">Star Name</h3>
        <div class="data-row"><span class="data-label">MAG:</span> <span id="intel-mag" class="data-val">--</span></div>
        <div class="data-row"><span class="data-label">DEC:</span> <span id="intel-dec" class="data-val">--</span></div>
        <div class="data-row"><span class="data-label">RAD:</span> <span id="intel-rad" class="data-val">--</span></div>
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- 1. CONFIGURATION ---
        const CONFIG = {
            earthRadius: 15,
            skyRadius: 100,
            starCount: 2500,
            colors: {
                earth: 0xaaaaaa,
                grid: 0xffffff,
                lines: 0x00ffff,
            }
        };

        const CONSTELLATION_DATA = [
            {"ra":23.65582, "dec":77.632276, "mag":3.21, "name":"Errai"},
            {"ra":21.477662,"dec":70.560716, "mag":3.23, "name":"Alfirk"},
            {"ra": 332.7137,"dec": 58.2013,"mag": 3.35,"name": "Zeta Cephai"},
            {"ra":21.30963, "dec":62.585573, "mag":2.45, "name":"Alderamin"}, 
            {"ra":22.82802, "dec":66.200408, "mag":3.5,  "name":"32Iot Cep"}
        ];
        const CONSTELLATION_DRAW_ORDER = ['Errai', 'Alfirk', '32Iot Cep', 'Alderamin', 'Zeta Cephai'];

        // --- 2. SCENE SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 30, 60);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none'; 
        document.body.appendChild(labelRenderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 0, 0);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 20;
        controls.maxDistance = 200;

        const clock = new THREE.Clock();
        const texLoader = new THREE.TextureLoader();
        const loadingManager = new THREE.LoadingManager();
        texLoader.manager = loadingManager;

        // --- 3. EARTH SYSTEM (PARENT GROUP) ---
        const earthGroup = new THREE.Group();
        scene.add(earthGroup);

        const earthMap = texLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_specular_2048.jpg');
        const starTexture = texLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/sprites/disc.png');

        const earthMesh = new THREE.Mesh(
            new THREE.SphereGeometry(CONFIG.earthRadius, 64, 64),
            new THREE.MeshBasicMaterial({
                map: earthMap,
                transparent: true, opacity: 0.9, color: CONFIG.colors.earth,
                blending: THREE.AdditiveBlending, side: THREE.FrontSide
            })
        );
        earthGroup.add(earthMesh);

        const earthGrid = new THREE.LineSegments(
            new THREE.WireframeGeometry(new THREE.SphereGeometry(CONFIG.earthRadius + 0.1, 24, 24)),
            new THREE.LineBasicMaterial({ color: CONFIG.colors.grid, transparent: true, opacity: 0.15 })
        );
        earthGroup.add(earthGrid);

        // --- 4. DATA UTILS ---
        function getStarPosition(raHours, decDeg, radius) {
            const phi = (90 - decDeg) * (Math.PI / 180);
            const theta = (raHours * 15) * (Math.PI / 180); 
            return new THREE.Vector3(
                radius * Math.sin(phi) * Math.cos(theta),
                radius * Math.cos(phi),
                radius * Math.sin(phi) * Math.sin(theta)
            );
        }

        function generateProceduralName(pos, mag) {
            const r = Math.round(pos.length()).toString().padStart(2, '0').substring(0, 2);
            const m = (mag * 10).toFixed(0).toString().padStart(2, '0').substring(0, 2);
            const decDeg = Math.abs(90 - (Math.acos(pos.y / pos.length()) * 180 / Math.PI));
            const d = Math.round(decDeg).toString().padStart(2, '0').substring(0, 2);
            return `Rad${r}Mag${m}Dec${d}`;
        }

        // --- 5. STAR GENERATION ---
        const allStarData = []; 
        const constellationPathPoints = [];
        const constellationByName = {};
        const geoPositions = [];
        const geoSizes = [];
        const geoAlphas = [];

        // 5a. Constellation Stars
        CONSTELLATION_DATA.forEach((star) => {
            const pos = getStarPosition(star.ra, star.dec, CONFIG.skyRadius);
            constellationByName[star.name] = pos.clone();
            geoPositions.push(pos.x, pos.y, pos.z);
            geoSizes.push(Math.max(5.0, 8.0 - star.mag));
            geoAlphas.push(1.0);

            allStarData.push({
                originalPos: pos.clone(),
                currentPos: pos.clone(),
                name: star.name,
                mag: star.mag,
                dec: star.dec.toFixed(1),
                rad: CONFIG.skyRadius.toFixed(0),
                labelObj: null
            });

            const div = document.createElement('div');
            div.className = 'constellation-label';
            div.textContent = star.name;
            const label = new CSS2DObject(div);
            label.position.copy(pos);
            earthGroup.add(label);
            allStarData[allStarData.length - 1].labelObj = label; 
        });

        CONSTELLATION_DRAW_ORDER.forEach((name) => {
            if (constellationByName[name]) constellationPathPoints.push(constellationByName[name].clone());
        });

        // 5b. Background Stars
        for (let i = 0; i < CONFIG.starCount; i++) {
            const r = CONFIG.skyRadius * (0.85 + Math.random() * 0.3);
            const theta = 2 * Math.PI * Math.random();
            const phi = Math.acos(2 * Math.random() - 1);
            
            const x = r * Math.sin(phi) * Math.cos(theta);
            const y = r * Math.sin(phi) * Math.sin(theta);
            const z = r * Math.cos(phi);
            const pos = new THREE.Vector3(x, y, z);

            geoPositions.push(x, y, z);
            
            const mag = Math.random() * 6;
            const size = Math.random() * 2.0 + 0.5;
            geoSizes.push(size);
            geoAlphas.push(Math.random() * 0.6 + 0.1);

            // Important: We push EVERY star to ensure 1:1 array mapping for smooth transitions
            allStarData.push({
                originalPos: pos.clone(),
                currentPos: pos.clone(),
                name: null, 
                mag: mag,
                dec: null, 
                rad: r,
                labelObj: null
            });
        }

        // 5c. Geometry
        const starGeometry = new THREE.BufferGeometry();
        starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(geoPositions, 3));
        starGeometry.setAttribute('aBaseSize', new THREE.Float32BufferAttribute(geoSizes, 1));
        starGeometry.setAttribute('aAlpha', new THREE.Float32BufferAttribute(geoAlphas, 1));

        const starMaterial = new THREE.ShaderMaterial({
            uniforms: { time: { value: 0 }, pointTexture: { value: starTexture } },
            vertexShader: `
                attribute float aBaseSize; attribute float aAlpha; varying float vAlpha;
                void main() {
                    vAlpha = aAlpha;
                    vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
                    gl_PointSize = aBaseSize * (300.0 / -mvPos.z);
                    gl_Position = projectionMatrix * mvPos;
                }
            `,
            fragmentShader: `
                uniform float time; uniform sampler2D pointTexture; varying float vAlpha;
                void main() {
                    vec4 color = texture2D(pointTexture, gl_PointCoord);
                    if (color.a < 0.5) discard;
                    float twinkle = 0.8 + 0.2 * sin(time * 5.0 + gl_FragCoord.x);
                    gl_FragColor = vec4(vec3(1.0), vAlpha * color.a * twinkle);
                }
            `,
            transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
        });

        const starSystem = new THREE.Points(starGeometry, starMaterial);
        earthGroup.add(starSystem);

        const path = new THREE.CatmullRomCurve3(constellationPathPoints, true);
        const tubeGeometry = new THREE.TubeGeometry(path, 64, 0.25, 8, true);
        const tubeMaterial = new THREE.MeshBasicMaterial({ color: CONFIG.colors.lines, transparent: true, opacity: 0.9 });
        const constellationLines = new THREE.Mesh(tubeGeometry, tubeMaterial);
        earthGroup.add(constellationLines);

        // --- 6. UI & HOVER LOGIC ---
        const mouse = new THREE.Vector2();
        const intelCard = document.getElementById('star-intel');
        const elName = document.getElementById('intel-name');
        const elMag = document.getElementById('intel-mag');
        const elDec = document.getElementById('intel-dec');
        const elRad = document.getElementById('intel-rad');

        window.addEventListener('mousemove', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            intelCard.style.left = (event.clientX + 20) + 'px';
            intelCard.style.top = (event.clientY + 20) + 'px';
        });

        // --- 7. ANIMATION STATE & LOGIC ---
        let state = {
            locating: true,
            wrappingSpace: false,
            somProgress: 0.0
        };
        
        const STATUS = document.getElementById('status');
        const identityBtn = document.getElementById('identity-btn');
        const wrapBtn = document.getElementById('wrap-btn');

        const somTargetPositions = new Float32Array(geoPositions.length);
        
        // Camera Lock Animation states
        let startCameraPos = new THREE.Vector3();
        let targetCameraPos = new THREE.Vector3(0, 0, 90);
        let startEarthQuat = new THREE.Quaternion();
        let targetEarthQuat = new THREE.Quaternion().identity(); // Reset rotation

        function prepareSOM() {
            // Setup smooth camera lock transition
            startCameraPos.copy(camera.position);
            startEarthQuat.copy(earthGroup.quaternion);
            
            // Calculate responsive bounds to fit screen perfectly
            const distanceToPlane = 90; // Fixed Z distance for grid
            const vFOV = camera.fov * THREE.MathUtils.DEG2RAD;
            const screenHeightAtDepth = 2 * Math.tan(vFOV / 2) * distanceToPlane;
            const screenWidthAtDepth = screenHeightAtDepth * camera.aspect;

            // Use 85% of visible screen area to give nice padding
            const gridWidth = screenWidthAtDepth * 0.85;
            const gridHeight = screenHeightAtDepth * 0.85;

            // Sort logic to cluster stars visually by 'Y' axis
            const sortableStars = [];
            for (let i = 0; i < allStarData.length; i++) {
                sortableStars.push({ index: i, y: allStarData[i].originalPos.y });
            }
            sortableStars.sort((a, b) => b.y - a.y);

            // Determine columns based on device aspect ratio (Landscape vs Portrait)
            const isPortrait = window.innerHeight > window.innerWidth;
            const cols = isPortrait ? 32 : 64; 
            const rows = Math.ceil(sortableStars.length / cols);
            
            const startX = -gridWidth / 2;
            const startY = gridHeight / 2;
            const stepX = gridWidth / cols;
            const stepY = gridHeight / rows;

            // Map target coordinates
            sortableStars.forEach((star, arrayIndex) => {
                const col = arrayIndex % cols;
                const row = Math.floor(arrayIndex / cols);

                const dataIndex = star.index * 3;
                somTargetPositions[dataIndex]     = startX + (col * stepX) + (stepX/2);
                somTargetPositions[dataIndex + 1] = startY - (row * stepY) - (stepY/2);
                somTargetPositions[dataIndex + 2] = 0; // Flat on the XY plane
            });
        }

        loadingManager.onLoad = () => {
            identityBtn.style.display = 'block';
            STATUS.textContent = 'Systems Online: Awaiting Operator Identity';
            state.locating = false; // Stop fast spin
        };

        // --- BUTTON EVENTS ---
        identityBtn.addEventListener('click', () => {
            // Assign Random Identity
            const randomStar = allStarData[Math.floor(Math.random() * allStarData.length)];
            const starName = randomStar.name || generateProceduralName(randomStar.originalPos, randomStar.mag);
            
            STATUS.textContent = `Welcome, Commander [${starName}]`;
            STATUS.style.borderLeftColor = '#00ffff';
            identityBtn.style.display = 'none';
            
            setTimeout(() => { wrapBtn.style.display = 'block'; }, 800);
        });

        wrapBtn.addEventListener('click', () => {
            wrapBtn.style.display = 'none';
            STATUS.textContent = 'Processing Topology: Locking Controls...';
            STATUS.style.borderLeftColor = '#ff7df5';
            
            // STRICT LOCK: Disable controls
            controls.enabled = false;
            controls.enableZoom = false;
            controls.enableRotate = false;
            controls.enablePan = false;

            prepareSOM();
            state.wrappingSpace = true;
        });

        // Easing Function
        const easeInOutCubic = t => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;

        // --- 8. ANIMATION LOOP ---
        const tempV = new THREE.Vector3();
        
        function animate() {
            requestAnimationFrame(animate);
            starMaterial.uniforms.time.value = clock.getElapsedTime();

            // --- HOVER LOGIC (Uses current dynamic position) ---
            let closestStar = null;
            let minDist = 15; 

            earthGroup.updateMatrixWorld();

            for (let i = 0; i < allStarData.length; i++) {
                const star = allStarData[i];
                
                // Track interpolated position for perfect raycasting
                tempV.copy(star.currentPos);
                tempV.applyMatrix4(earthGroup.matrixWorld);
                tempV.project(camera); 

                if (tempV.z < 1) { 
                    const x = (tempV.x * .5 + .5) * window.innerWidth;
                    const y = -(tempV.y * .5 - .5) * window.innerHeight;
                    const dx = x - ((mouse.x * .5 + .5) * window.innerWidth);
                    const dy = y - (-(mouse.y * .5 - .5) * window.innerHeight);

                    if (Math.sqrt(dx * dx + dy * dy) < minDist) {
                        closestStar = star;
                        break; 
                    }
                }
            }

            // Update Intel UI
            if (closestStar) {
                intelCard.style.display = 'block';
                document.body.style.cursor = 'crosshair';

                if (closestStar.name) {
                    elName.textContent = closestStar.name;
                    elName.style.color = "#00ffff"; 
                } else {
                    elName.textContent = generateProceduralName(closestStar.originalPos, closestStar.mag);
                    elName.style.color = "#ffcc00"; 
                }
                
                elMag.textContent = closestStar.mag.toFixed(2);
                
                if(closestStar.dec) {
                    elDec.textContent = closestStar.dec;
                    elRad.textContent = closestStar.rad;
                } else {
                    const rVal = closestStar.originalPos.length();
                    elDec.textContent = Math.abs(90 - (Math.acos(closestStar.originalPos.y / rVal) * 180 / Math.PI)).toFixed(1);
                    elRad.textContent = rVal.toFixed(1);
                }
            } else {
                intelCard.style.display = 'none';
                document.body.style.cursor = 'default';
            }

            // --- STATE ANIMATIONS ---
            if (state.locating) {
                earthGroup.rotation.y += 0.05; // Initial quick spin
            } else if (state.wrappingSpace) {
                state.somProgress += 0.006; 
                if (state.somProgress >= 1.0) state.somProgress = 1.0;
                
                const ease = easeInOutCubic(state.somProgress);

                // 1. Lerp camera to fixed front position
                camera.position.lerpVectors(startCameraPos, targetCameraPos, ease);
                
                // 2. Slerp earth rotation to 0
                earthGroup.quaternion.slerpQuaternions(startEarthQuat, targetEarthQuat, ease);

                // 3. Lerp Star Positions
                const positions = starGeometry.attributes.position.array;
                for (let i = 0; i < allStarData.length; i++) {
                    const dataIdx = i * 3;
                    
                    const newX = THREE.MathUtils.lerp(allStarData[i].originalPos.x, somTargetPositions[dataIdx], ease);
                    const newY = THREE.MathUtils.lerp(allStarData[i].originalPos.y, somTargetPositions[dataIdx+1], ease);
                    const newZ = THREE.MathUtils.lerp(allStarData[i].originalPos.z, somTargetPositions[dataIdx+2], ease);
                    
                    // Update Geometry
                    positions[dataIdx] = newX;
                    positions[dataIdx+1] = newY;
                    positions[dataIdx+2] = newZ;
                    
                    // Update Data array for Hover logic
                    allStarData[i].currentPos.set(newX, newY, newZ);
                }
                starGeometry.attributes.position.needsUpdate = true;
                
                // Fade out 3D Constellation guides
                constellationLines.material.opacity = 0.9 * (1 - ease);
                allStarData.forEach(star => {
                    if (star.labelObj && star.labelObj.element) {
                        star.labelObj.element.style.opacity = 0.9 * (1 - ease);
                    }
                });

                if (state.somProgress === 1.0) {
                    state.wrappingSpace = false;
                    STATUS.textContent = 'Topology Mapped: 2D Holographic Lattice Active';
                    STATUS.style.borderLeftColor = '#ffdbfa';
                }
            } else if (state.somProgress === 0) {
                // Natural idle rotation before wrapping
                earthGroup.rotation.y += 0.0005;
            }

            if(controls.enabled) controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
            
            // Recalculate grid dynamically if window resizes after wrapping
            if(state.somProgress === 1.0) {
                prepareSOM();
                
                const positions = starGeometry.attributes.position.array;
                for (let i = 0; i < allStarData.length; i++) {
                    const dataIdx = i * 3;
                    positions[dataIdx] = somTargetPositions[dataIdx];
                    positions[dataIdx+1] = somTargetPositions[dataIdx+1];
                    positions[dataIdx+2] = somTargetPositions[dataIdx+2];
                    allStarData[i].currentPos.set(somTargetPositions[dataIdx], somTargetPositions[dataIdx+1], somTargetPositions[dataIdx+2]);
                }
                starGeometry.attributes.position.needsUpdate = true;
            }
        });

        animate();

    </script>
</body>
</html>
