<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Space Network: Cepheus</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #030305; font-family: 'Courier New', Courier, monospace; }
        
        /* UI Overlay */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        #status {
            position: absolute; bottom: 30px; left: 30px;
            color: #80ff80; font-size: 14px; text-transform: uppercase;
            letter-spacing: 2px;
            background: rgba(0, 20, 0, 0.8);
            padding: 12px 20px;
            border-left: 4px solid #80ff80;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 15px rgba(128, 255, 128, 0.2);
            border-radius: 0 4px 4px 0;
            transition: border-color 0.5s, color 0.5s;
        }

        /* Hover Data Card */
        #star-intel {
            position: absolute;
            display: none;
            background: rgba(0, 15, 30, 0.95);
            border: 1px solid #7dd3ff;
            color: #e0f7ff;
            padding: 15px;
            border-radius: 4px;
            pointer-events: none;
            z-index: 20;
            font-size: 12px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
            min-width: 170px;
            backdrop-filter: blur(5px);
        }
        #star-intel h3 { 
            margin: 0 0 10px 0; 
            color: #00ffff; 
            font-size: 15px; 
            border-bottom: 1px solid rgba(125, 211, 255, 0.3); 
            padding-bottom: 5px; 
            text-shadow: 0 0 8px #00ffff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 6px; }
        .data-label { color: #88c0d0; opacity: 0.8; }
        .data-val { color: #fff; font-weight: bold; font-family: monospace; }
        
        /* Permanent Star Labels */
        .constellation-label {
            color: #7dd3ff;
            font-size: 11px;
            font-weight: bold;
            margin-top: -20px; 
            text-shadow: 0 0 6px #000, 0 0 3px #7dd3ff;
            pointer-events: none; 
            white-space: nowrap;
            opacity: 0.9;
        }

        /* Buttons */
        .btn-core {
            position: absolute;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            padding: 14px 28px;
            border-radius: 4px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: bold;
            cursor: pointer;
            display: none;
            pointer-events: auto;
            transition: all 0.3s ease;
            background: rgba(0, 18, 32, 0.85);
            backdrop-filter: blur(4px);
        }

        #identity-btn {
            border: 1px solid #44d7ff;
            color: #d8f7ff;
            box-shadow: 0 0 15px rgba(68, 215, 255, 0.4);
        }
        #identity-btn:hover {
            background: rgba(0, 45, 75, 0.95);
            box-shadow: 0 0 25px rgba(68, 215, 255, 0.8);
            transform: translateX(-50%) scale(1.05);
        }

        #wrap-btn {
            border: 1px solid #ff00ff;
            color: #ffdbfa;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.4);
        }
        #wrap-btn:hover {
            background: rgba(45, 0, 45, 0.95);
            box-shadow: 0 0 25px rgba(255, 0, 255, 0.8);
            transform: translateX(-50%) scale(1.05);
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="status">System Initializing...</div>
        <button id="identity-btn" class="btn-core">Acquire Identity</button>
        <button id="wrap-btn" class="btn-core">Wrap Space Around You</button>
    </div>

    <div id="star-intel">
        <h3 id="intel-name">Star Name</h3>
        <div class="data-row"><span class="data-label">MAG:</span> <span id="intel-mag" class="data-val">--</span></div>
        <div class="data-row"><span class="data-label">DEC:</span> <span id="intel-dec" class="data-val">--</span></div>
        <div class="data-row"><span class="data-label">RAD:</span> <span id="intel-rad" class="data-val">--</span></div>
        <div class="data-row"><span class="data-label">CLASS:</span> <span id="intel-class" class="data-val">--</span></div>
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- 1. CONFIGURATION ---
        const CONFIG = {
            earthRadius: 15,
            skyRadius: 100,
            starCount: 2500,
            colors: {
                earth: 0x888888,
                grid: 0xffffff,
                lines: 0x00ffff,
            }
        };

        const CONSTELLATION_DATA = [
            {"ra":23.65582, "dec":77.632276, "mag":3.21, "name":"Errai"},
            {"ra":21.477662,"dec":70.560716, "mag":3.23, "name":"Alfirk"},
            {"ra": 332.7137,"dec": 58.2013,"mag": 3.35,"name": "Zeta Cephai"},
            {"ra":21.30963, "dec":62.585573, "mag":2.45, "name":"Alderamin"}, 
            {"ra":22.82802, "dec":66.200408, "mag":3.5,  "name":"32Iot Cep"}
        ];
        const CONSTELLATION_DRAW_ORDER = ['Errai', 'Alfirk', '32Iot Cep', 'Alderamin', 'Zeta Cephai'];

        // --- 2. SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x030305, 0.002); // Adds deep space depth

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 30, 60);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none'; 
        document.body.appendChild(labelRenderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 0, 0);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 20;
        controls.maxDistance = 200;

        const clock = new THREE.Clock();
        const texLoader = new THREE.TextureLoader();
        const loadingManager = new THREE.LoadingManager();
        texLoader.manager = loadingManager;

        // --- 3. EARTH SYSTEM ---
        const earthGroup = new THREE.Group();
        scene.add(earthGroup);

        const earthMap = texLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_specular_2048.jpg');
        const starTexture = texLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/sprites/disc.png');

        const earthMesh = new THREE.Mesh(
            new THREE.SphereGeometry(CONFIG.earthRadius, 64, 64),
            new THREE.MeshBasicMaterial({
                map: earthMap,
                transparent: true, opacity: 0.8, color: CONFIG.colors.earth,
                blending: THREE.AdditiveBlending
            })
        );
        earthGroup.add(earthMesh);

        const earthWire = new THREE.LineSegments(
            new THREE.WireframeGeometry(new THREE.SphereGeometry(CONFIG.earthRadius + 0.2, 32, 32)),
            new THREE.LineBasicMaterial({ color: 0x44d7ff, transparent: true, opacity: 0.1 })
        );
        earthGroup.add(earthWire);

        // --- 4. DATA UTILS ---
        function getStarPosition(raHours, decDeg, radius) {
            const phi = (90 - decDeg) * (Math.PI / 180);
            const theta = (raHours * 15) * (Math.PI / 180); 
            return new THREE.Vector3(
                radius * Math.sin(phi) * Math.cos(theta),
                radius * Math.cos(phi),
                radius * Math.sin(phi) * Math.sin(theta)
            );
        }

        function generateProceduralName(pos, mag) {
            const r = Math.round(pos.length()).toString().padStart(2, '0').substring(0, 2);
            const m = (mag * 10).toFixed(0).toString().padStart(2, '0').substring(0, 2);
            return `SEC-${r}-X${m}`;
        }

        // --- 5. HIGH-PERFORMANCE STAR GENERATION ---
        const allStarData = []; 
        const constellationPathPoints = [];
        const constellationByName = {};
        
        const geoPositions = [];
        const geoSizes = [];
        const geoAlphas = [];
        const geoColors = []; // NEW: For dynamic data coloring

        // 5a. Constellation Stars
        CONSTELLATION_DATA.forEach((star) => {
            const pos = getStarPosition(star.ra, star.dec, CONFIG.skyRadius);
            constellationByName[star.name] = pos.clone();
            geoPositions.push(pos.x, pos.y, pos.z);
            geoSizes.push(Math.max(6.0, 10.0 - star.mag)); // Slightly larger
            geoAlphas.push(1.0);
            geoColors.push(1.0, 1.0, 1.0); // Start white

            allStarData.push({
                originalPos: pos.clone(),
                name: star.name,
                mag: star.mag.toFixed(2),
                dec: star.dec.toFixed(1),
                rad: CONFIG.skyRadius.toFixed(0),
                class: 'PRIMUS',
                labelObj: null
            });

            const div = document.createElement('div');
            div.className = 'constellation-label';
            div.textContent = star.name;
            const label = new CSS2DObject(div);
            label.position.copy(pos);
            earthGroup.add(label);
            allStarData[allStarData.length - 1].labelObj = label; 
        });

        CONSTELLATION_DRAW_ORDER.forEach((name) => {
            if (constellationByName[name]) constellationPathPoints.push(constellationByName[name].clone());
        });

        // 5b. Background Stars
        for (let i = 0; i < CONFIG.starCount; i++) {
            const r = CONFIG.skyRadius * (0.85 + Math.random() * 0.3);
            const theta = 2 * Math.PI * Math.random();
            const phi = Math.acos(2 * Math.random() - 1);
            
            const x = r * Math.sin(phi) * Math.cos(theta);
            const y = r * Math.sin(phi) * Math.sin(theta);
            const z = r * Math.cos(phi);
            const pos = new THREE.Vector3(x, y, z);

            geoPositions.push(x, y, z);
            
            const mag = Math.random() * 6;
            const size = Math.random() * 2.5 + 0.5;
            geoSizes.push(size);
            geoAlphas.push(Math.random() * 0.7 + 0.1);
            geoColors.push(1.0, 1.0, 1.0); // Start white

            allStarData.push({
                originalPos: pos.clone(),
                name: null, 
                mag: mag.toFixed(2),
                dec: Math.abs(90 - (phi * 180 / Math.PI)).toFixed(1), 
                rad: r.toFixed(1),
                class: mag < 2 ? 'ALPHA' : (mag < 4 ? 'BETA' : 'GAMMA'),
                labelObj: null
            });
        }

        // 5c. Custom Advanced Shader Geometry
        const starGeometry = new THREE.BufferGeometry();
        starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(geoPositions, 3));
        starGeometry.setAttribute('aBaseSize', new THREE.Float32BufferAttribute(geoSizes, 1));
        starGeometry.setAttribute('aAlpha', new THREE.Float32BufferAttribute(geoAlphas, 1));
        starGeometry.setAttribute('aColor', new THREE.Float32BufferAttribute(geoColors, 3));

        const starMaterial = new THREE.ShaderMaterial({
            uniforms: { time: { value: 0 }, pointTexture: { value: starTexture } },
            vertexShader: `
                attribute float aBaseSize; 
                attribute float aAlpha; 
                attribute vec3 aColor;
                varying float vAlpha;
                varying vec3 vColor;
                void main() {
                    vAlpha = aAlpha;
                    vColor = aColor;
                    vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
                    gl_PointSize = aBaseSize * (300.0 / -mvPos.z);
                    gl_Position = projectionMatrix * mvPos;
                }
            `,
            fragmentShader: `
                uniform float time; 
                uniform sampler2D pointTexture; 
                varying float vAlpha;
                varying vec3 vColor;
                void main() {
                    vec4 texColor = texture2D(pointTexture, gl_PointCoord);
                    if (texColor.a < 0.5) discard;
                    float twinkle = 0.7 + 0.3 * sin(time * 3.0 + gl_FragCoord.x);
                    gl_FragColor = vec4(vColor, vAlpha * texColor.a * twinkle);
                }
            `,
            transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
        });

        const starSystem = new THREE.Points(starGeometry, starMaterial);
        earthGroup.add(starSystem);

        const path = new THREE.CatmullRomCurve3(constellationPathPoints, true);
        const tubeGeometry = new THREE.TubeGeometry(path, 64, 0.15, 8, true);
        const tubeMaterial = new THREE.MeshBasicMaterial({ color: CONFIG.colors.lines, transparent: true, opacity: 0.6 });
        const constellationLines = new THREE.Mesh(tubeGeometry, tubeMaterial);
        earthGroup.add(constellationLines);

        // --- 6. OPTIMIZED RAYCASTER (HOVER LOGIC) ---
        const raycaster = new THREE.Raycaster();
        raycaster.params.Points.threshold = 1.5; // Generous hit area
        const mouse = new THREE.Vector2();
        
        const intelCard = document.getElementById('star-intel');
        const elName = document.getElementById('intel-name');
        const elMag = document.getElementById('intel-mag');
        const elDec = document.getElementById('intel-dec');
        const elRad = document.getElementById('intel-rad');
        const elClass = document.getElementById('intel-class');

        window.addEventListener('mousemove', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            intelCard.style.left = (event.clientX + 20) + 'px';
            intelCard.style.top = (event.clientY + 20) + 'px';
        });

        // --- 7. ANIMATION STATE & SOM LOGIC ---
        let state = {
            locating: true,
            wrappingSpace: false,
            somProgress: 0.0
        };
        
        const STATUS = document.getElementById('status');
        const identityBtn = document.getElementById('identity-btn');
        const wrapBtn = document.getElementById('wrap-btn');

        const somTargetPositions = new Float32Array(geoPositions.length);
        const somTargetColors = new Float32Array(geoPositions.length);
        
        let startCameraPos = new THREE.Vector3();
        let targetCameraPos = new THREE.Vector3(0, 0, 100); // Backed up slightly
        let startEarthQuat = new THREE.Quaternion();
        let targetEarthQuat = new THREE.Quaternion().identity(); 
        let startControlsTarget = new THREE.Vector3();

        function prepareSOM() {
            startCameraPos.copy(camera.position);
            startEarthQuat.copy(earthGroup.quaternion);
            startControlsTarget.copy(controls.target);
            
            // 1. Calculate perfectly responsive grid
            const zPlane = 30; // Float the grid in front of Earth (Earth is radius 15)
            const distFromCam = targetCameraPos.z - zPlane; // 100 - 30 = 70
            
            // Visible height at the Z plane
            const vFOV = camera.fov * THREE.MathUtils.DEG2RAD;
            const visibleHeight = 2 * Math.tan(vFOV / 2) * distFromCam;
            const visibleWidth = visibleHeight * camera.aspect;

            // Use 90% of screen to create a nice futuristic border
            const gridW = visibleWidth * 0.90;
            const gridH = visibleHeight * 0.90;
            
            const startX = -gridW / 2;
            const startY = gridH / 2;

            // Sort logic to cluster stars visually
            const sortableStars = [];
            for (let i = 0; i < allStarData.length; i++) {
                sortableStars.push({ index: i, val: allStarData[i].originalPos.y });
            }
            sortableStars.sort((a, b) => b.val - a.val);

            // Responsive Columns
            const isPortrait = window.innerHeight > window.innerWidth;
            const cols = isPortrait ? 30 : 60; 
            const rows = Math.ceil(sortableStars.length / cols);
            
            const stepX = gridW / cols;
            const stepY = gridH / rows;

            // 2. Map coordinates and colors
            sortableStars.forEach((star, arrayIndex) => {
                const col = arrayIndex % cols;
                const row = Math.floor(arrayIndex / cols);

                const dataIndex = star.index * 3;
                // Target Position
                somTargetPositions[dataIndex]     = startX + (col * stepX) + (stepX/2);
                somTargetPositions[dataIndex + 1] = startY - (row * stepY) - (stepY/2);
                somTargetPositions[dataIndex + 2] = zPlane; // Pushed in front of earth

                // Target Color Gradient (Cyan to Magenta based on grid position)
                const colorFactor = (col / cols) * 0.8 + (row / rows) * 0.2; 
                const color = new THREE.Color().setHSL(0.5 + colorFactor * 0.4, 1.0, 0.6); // Cyberpunk gradient
                somTargetColors[dataIndex]     = color.r;
                somTargetColors[dataIndex + 1] = color.g;
                somTargetColors[dataIndex + 2] = color.b;
            });
        }

        loadingManager.onLoad = () => {
            identityBtn.style.display = 'block';
            STATUS.textContent = 'Systems Online: Awaiting Operator Identity';
            state.locating = false; 
        };

        // --- BUTTON EVENTS ---
        identityBtn.addEventListener('click', () => {
            const randomStar = allStarData[Math.floor(Math.random() * allStarData.length)];
            const starName = randomStar.name || generateProceduralName(randomStar.originalPos, randomStar.mag);
            
            STATUS.textContent = `Welcome, Commander [${starName}]`;
            STATUS.style.borderLeftColor = '#00ffff';
            STATUS.style.color = '#00ffff';
            identityBtn.style.display = 'none';
            
            setTimeout(() => { wrapBtn.style.display = 'block'; }, 800);
        });

        wrapBtn.addEventListener('click', () => {
            wrapBtn.style.display = 'none';
            STATUS.textContent = 'Processing Topology: Locking Controls...';
            STATUS.style.borderLeftColor = '#ff00ff';
            STATUS.style.color = '#ffdbfa';
            
            // STRICT LOCK: Ensure screen fits perfectly
            controls.enabled = false;

            prepareSOM();
            state.wrappingSpace = true;
        });

        // Easing Function
        const easeInOutCubic = t => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;

        // --- 8. ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            starMaterial.uniforms.time.value = clock.getElapsedTime();

            // --- HIGH PERFORMANCE RAYCASTER ---
            if (!state.locating) {
                raycaster.setFromCamera(mouse, camera);
                // Important: Update MatrixWorld before raycasting
                earthGroup.updateMatrixWorld();
                
                const intersects = raycaster.intersectObject(starSystem);
                
                if (intersects.length > 0) {
                    const idx = intersects[0].index;
                    const star = allStarData[idx];
                    
                    intelCard.style.display = 'block';
                    document.body.style.cursor = 'crosshair';

                    elName.textContent = star.name || generateProceduralName(star.originalPos, star.mag);
                    elName.style.color = star.name ? "#00ffff" : "#ffcc00"; 
                    elMag.textContent = star.mag;
                    elDec.textContent = star.dec;
                    elRad.textContent = star.rad;
                    
                    // Assign class colors
                    elClass.textContent = star.class;
                    if(star.class === 'PRIMUS') elClass.style.color = '#ff00ff';
                    else if(star.class === 'ALPHA') elClass.style.color = '#00ffff';
                    else elClass.style.color = '#aaaaaa';

                } else {
                    intelCard.style.display = 'none';
                    document.body.style.cursor = 'default';
                }
            }

            // --- STATE ANIMATIONS ---
            if (state.locating) {
                earthGroup.rotation.y += 0.05; 
            } else if (state.wrappingSpace) {
                state.somProgress += 0.006; 
                if (state.somProgress >= 1.0) state.somProgress = 1.0;
                
                const ease = easeInOutCubic(state.somProgress);

                // 1. Lerp camera and strictly enforce target center
                camera.position.lerpVectors(startCameraPos, targetCameraPos, ease);
                controls.target.lerpVectors(startControlsTarget, new THREE.Vector3(0,0,0), ease);
                
                // 2. Slerp earth rotation perfectly to front
                earthGroup.quaternion.slerpQuaternions(startEarthQuat, targetEarthQuat, ease);

                // 3. Lerp Star Positions and Colors
                const positions = starGeometry.attributes.position.array;
                const colors = starGeometry.attributes.aColor.array;

                for (let i = 0; i < allStarData.length; i++) {
                    const dataIdx = i * 3;
                    
                    // Positions
                    positions[dataIdx]   = THREE.MathUtils.lerp(allStarData[i].originalPos.x, somTargetPositions[dataIdx], ease);
                    positions[dataIdx+1] = THREE.MathUtils.lerp(allStarData[i].originalPos.y, somTargetPositions[dataIdx+1], ease);
                    positions[dataIdx+2] = THREE.MathUtils.lerp(allStarData[i].originalPos.z, somTargetPositions[dataIdx+2], ease);
                    
                    // Colors (White to Gradient)
                    colors[dataIdx]   = THREE.MathUtils.lerp(1.0, somTargetColors[dataIdx], ease);
                    colors[dataIdx+1] = THREE.MathUtils.lerp(1.0, somTargetColors[dataIdx+1], ease);
                    colors[dataIdx+2] = THREE.MathUtils.lerp(1.0, somTargetColors[dataIdx+2], ease);
                }
                starGeometry.attributes.position.needsUpdate = true;
                starGeometry.attributes.aColor.needsUpdate = true;
                
                // Fade out 3D elements
                constellationLines.material.opacity = 0.6 * (1 - ease);
                earthWire.material.opacity = 0.1 * (1 - ease);
                allStarData.forEach(star => {
                    if (star.labelObj && star.labelObj.element) {
                        star.labelObj.element.style.opacity = 0.9 * (1 - ease);
                    }
                });

                if (state.somProgress === 1.0) {
                    state.wrappingSpace = false;
                    STATUS.textContent = 'Topology Mapped: Multi-Dimensional Array Active';
                }
            } else if (state.somProgress === 0) {
                earthGroup.rotation.y += 0.0005;
            }

            if(controls.enabled) controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
            
            // Auto-correct grid size if window resizes while mapped
            if(state.somProgress === 1.0) {
                prepareSOM(); // Recalculate aspect-perfect bounds
                const positions = starGeometry.attributes.position.array;
                const colors = starGeometry.attributes.aColor.array;
                for (let i = 0; i < allStarData.length; i++) {
                    const dataIdx = i * 3;
                    positions[dataIdx] = somTargetPositions[dataIdx];
                    positions[dataIdx+1] = somTargetPositions[dataIdx+1];
                    positions[dataIdx+2] = somTargetPositions[dataIdx+2];
                    colors[dataIdx] = somTargetColors[dataIdx];
                    colors[dataIdx+1] = somTargetColors[dataIdx+1];
                    colors[dataIdx+2] = somTargetColors[dataIdx+2];
                }
                starGeometry.attributes.position.needsUpdate = true;
                starGeometry.attributes.aColor.needsUpdate = true;
            }
        });

        animate();

    </script>
</body>
</html>
